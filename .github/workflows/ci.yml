name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: hallakompis
          POSTGRES_PASSWORD: hallakompis
          POSTGRES_DB: hallakompis
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: DB push
        run: pnpm db:push
        env:
          DATABASE_URL: postgresql://hallakompis:hallakompis@localhost:5432/hallakompis
      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: postgresql://hallakompis:hallakompis@localhost:5432/hallakompis
          NEXT_PUBLIC_API_URL: http://localhost:3001
